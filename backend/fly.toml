app = "fitai-coach-api"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATABASE_URL = "file:/data/prod.db"
  CLIENT_URL = "https://ehsanullaherfani.github.io"
  GROQ_MODEL = "llama-3.1-8b-instant"
  GROQ_VISION_MODEL = "meta-llama/llama-4-scout-17b-16e-instruct"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "fitai_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
