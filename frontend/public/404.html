<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FitAI Coach</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0f0f11;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif}
  .wrap{text-align:center;color:#e4e4e7}
  .logo{font-size:2rem;font-weight:800;color:#e11d48;margin-bottom:.5rem}
  .msg{color:#71717a;font-size:.9rem}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#e11d48;margin:0 3px;animation:bounce .9s infinite ease-in-out}
  .dot:nth-child(2){animation-delay:.15s}
  .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}}
  .dots{margin-top:1rem}
</style>
<script>
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body>
  <div class="wrap">
    <div class="logo">FitAI Coach</div>
    <div class="msg">Loading your page…</div>
    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
